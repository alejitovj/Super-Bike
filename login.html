<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Superbike</title>

    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

    <div class="auth-container">

        <form class="auth-card">

            <h1>Iniciar Sesión</h1>

            <p>
                Bienvenido nuevamente a Superbike
            </p>

            <input type="email"
            placeholder="Correo electrónico"
            required>

            <input type="password"
            placeholder="Contraseña"
            required>

            <button type="submit">
                Ingresar
            </button>

            <span>
                ¿No tienes cuenta?
                <a href="registro.html">
                    Regístrate
                </a>
            </span>

        </form>

    </div>

</body>
</html>
