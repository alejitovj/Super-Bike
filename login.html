<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar Sesión | Superbike</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="auth-body">
<div id="mensaje-login" class="mensaje-exito">❌ Correo o contraseña incorrectos.</div>
<div class="auth-container">
<form id="loginForm" action="login.php" method="POST" class="auth-card">

<h1>Iniciar Sesión</h1>

<p>Bienvenido nuevamente a Superbike</p>
<input type="email" name="email" placeholder="Correo electrónico" required>
<input type="password" name="password" placeholder="Contraseña" required>
<button type="submit">Ingresar</button>
<span>¿No tienes cuenta? <a href="registro.html">Regístrate</a></span>
</form>
</div>

<script>
const login=document.getElementById("loginForm");

login.addEventListener("submit",function(e){
e.preventDefault();

const datos=new FormData(this);

fetch("login.php",{
method:"POST",
body:datos
})
.then(res=>res.text())
.then(respuesta=>{
if(respuesta.trim()=="ok"){
window.location.href="index.html";
}else{
const mensaje=document.getElementById("mensaje-login");
mensaje.style.display="block";

setTimeout(()=>{
mensaje.style.display="none";
},2500);
}
});
});
</script>
</body>
</html>
