<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Superbike</title>

    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

    <div class="auth-container">

        <form class="auth-card">

            <h1>Crear Cuenta</h1>

            <p>
                Únete a la experiencia Superbike
            </p>

            <input type="text"
            placeholder="Nombre completo"
            required>

            <input type="email"
            placeholder="Correo electrónico"
            required>

            <input type="text"
            placeholder="Nombre de usuario"
            required>

            <input type="password"
            placeholder="Contraseña"
            required>

            <input type="password"
            placeholder="Confirmar contraseña"
            required>

            <button type="submit">
                Registrarse
            </button>

            <span>
                ¿Ya tienes cuenta?
                <a href="login.html">
                    Inicia sesión
                </a>
            </span>

        </form>

    </div>

</body>
</html>
