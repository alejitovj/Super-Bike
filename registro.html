<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Superbike</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

    <div class="auth-container">
    <form id="registroForm" class="auth-card">

        <h1>Crear Cuenta</h1>
            <p>Únete a la experiencia Superbike</p>
            
            <input type="text" name="nombre" placeholder="Nombre completo" required>
            <input type="email" name="email" placeholder="Correo electrónico" required>
            <input type="text" name="usuario" placeholder="Nombre de usuario" required>
            <input type="password" name="password" placeholder="Contraseña" required>
            
            <button type="submit">Registrarse</button>
            
            <span>
                ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
            </span>
        </form>
    </div>

<div id="mensaje-exito" class="toast">
<div class="toast-icon">✔</div>
<div class="toast-text">
<h4>Registro exitoso</h4>
<p>Bienvenido a Superbike 🚲</p>
</div>
<div class="toast-bar"></div>
</div>

    <script>
const formulario=document.getElementById("registroForm");

formulario.addEventListener("submit",function(e){
e.preventDefault();

const datos=new FormData(this);

fetch("/registro/",{
method:"POST",
body:datos
})
.then(res=>res.text())
.then(respuesta=>{
if(respuesta.trim()=="ok"){
const toast=document.getElementById("mensaje-exito");

toast.style.display="flex";

const barra=toast.querySelector(".toast-bar");
barra.style.animation="none";
barra.offsetHeight;
barra.style.animation="barra 2.5s linear forwards";

formulario.reset();

setTimeout(()=>{
toast.style.display="none";
},2500);

}else{
alert(respuesta);
}
});
});
</script>

</body>
</html>
